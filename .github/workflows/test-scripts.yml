name: Test Scripts (Apple Silicon)

on:
  push:
    branches: [ main ]
    paths:
      - ".config/**"
      - ".github/**"
      - ".mise.toml"
      - ".vimrc"
      - ".zshrc"
      - "Brewfile"
      - "install.sh"
      - "link.sh"
      - "settings.sh"
  pull_request:
    branches: [ main ]
    paths:
      - ".config/**"
      - ".github/**"
      - ".mise.toml"
      - ".vimrc"
      - ".zshrc"
      - "Brewfile"
      - "install.sh"
      - "link.sh"
      - "settings.sh"

# Cancel superseded runs on the same PR; never cancel main pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Static analysis: shellcheck / shfmt for bash, actionlint for workflows,
  # zsh -n for zsh configs (shellcheck does not support zsh).
  # The job installs its own pinned tools; nothing is required locally.
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    # Route each tracked *.sh to the right checker by shebang: sh/bash go to
    # shellcheck + shfmt; the rest (zsh configs sourced from .zshrc, which
    # have no sh/bash shebang) get zsh -n, since shellcheck cannot parse zsh.
    # New scripts are picked up automatically without editing this list.
    - name: Collect shell scripts by dialect
      run: |
        git ls-files '*.sh' | sort > /tmp/all-scripts.txt
        while IFS= read -r f; do
          if head -n1 "$f" | grep -Eq '^#!.*/(env )?(ba)?sh( |$)'; then echo "$f"; fi
        done < /tmp/all-scripts.txt > /tmp/bash-scripts.txt
        comm -13 /tmp/bash-scripts.txt /tmp/all-scripts.txt > /tmp/zsh-scripts.txt
        printf '.zshrc\n.zshenv\n' >> /tmp/zsh-scripts.txt
        echo "== sh/bash (shellcheck + shfmt):"; cat /tmp/bash-scripts.txt
        echo "== zsh (zsh -n):"; cat /tmp/zsh-scripts.txt
        test -s /tmp/bash-scripts.txt

    - name: shellcheck
      run: xargs shellcheck < /tmp/bash-scripts.txt

    - name: shfmt (format check)
      env:
        SHFMT_VERSION: v3.13.1
      run: |
        curl -sSfL -o /tmp/shfmt "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_${SHFMT_VERSION}_linux_amd64"
        chmod +x /tmp/shfmt
        xargs /tmp/shfmt -i 2 -d < /tmp/bash-scripts.txt

    - name: actionlint
      env:
        ACTIONLINT_VERSION: 1.7.12
      run: |
        bash <(curl -sSfL "https://raw.githubusercontent.com/rhysd/actionlint/v${ACTIONLINT_VERSION}/scripts/download-actionlint.bash") "$ACTIONLINT_VERSION" /tmp
        /tmp/actionlint -color

    - name: zsh syntax check
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq zsh
        while IFS= read -r f; do
          zsh -n "$f"
          echo "ok: $f"
        done < /tmp/zsh-scripts.txt

  # Detect whether install-related files changed, so the slow
  # install test only runs when it can actually catch something
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      install: ${{ steps.filter.outputs.install }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Detect changed paths
      id: filter
      uses: dorny/paths-filter@v4
      with:
        filters: |
          install:
            - 'install.sh'
            - 'Brewfile'
            - '.mise.toml'
            - '.github/workflows/test-scripts.yml'
            - '.github/scripts/test-install.sh'

  # Fast checks (~30s): symlinks, config syntax, karabiner build, settings
  test-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Set up environment
      run: ./.github/scripts/setup-environment.sh

    - name: Test link.sh
      run: ./.github/scripts/test-link.sh

    - name: Test configuration files
      run: ./.github/scripts/test-config.sh

    - name: Setup bun
      uses: oven-sh/setup-bun@v2

    - name: Test karabiner.ts build idempotency
      run: ./.github/scripts/test-karabiner-build.sh

    - name: Test Brewfile
      run: ./.github/scripts/test-brewfile.sh

    - name: Test settings.sh
      run: ./.github/scripts/test-settings.sh

    - name: Cleanup
      if: always()
      run: ./.github/scripts/cleanup-environment.sh

  # Full install test: runs the real install.sh, tailored for CI via env vars only
  test-install:
    needs: changes
    if: needs.changes.outputs.install == 'true'
    runs-on: macos-latest
    env:
      # GUI casks are large downloads and nothing in CI verifies them
      HOMEBREW_BUNDLE_CASK_SKIP: "ghostty zed font-hack-nerd-font"
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
      # Heavy runtimes add minutes without exercising extra install.sh logic
      MISE_DISABLE_TOOLS: "gcloud,terraform,rust,rust-analyzer"
      MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}
      # mise hits the GitHub Releases API (aqua backend); unauthenticated
      # requests share a 60/hr per-IP limit across hosted runners and flake
      GITHUB_TOKEN: ${{ github.token }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Test install.sh (actual execution)
      run: ./.github/scripts/test-install.sh
