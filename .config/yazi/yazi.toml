# デフォルトの open rules を上書き
# https://github.com/sxyazi/yazi/blob/shipped/yazi-config/preset/yazi-default.toml
#
# 変更点: フォールバックルール (url = "*") に "edit" を追加
# MIME タイプが特定できないファイル (空ファイル, 短いファイル等) を
# macOS の open (= Cursor) ではなく $EDITOR (= hx) で開くようにする
[open]
rules = [
	{ url = "*/", use = [ "edit", "open", "reveal" ] },
	{ mime = "text/*", use = [ "edit", "reveal" ] },
	{ mime = "image/*", use = [ "open", "reveal" ] },
	{ mime = "{audio,video}/*", use = [ "play", "reveal" ] },
	{ mime = "application/{zip,rar,7z*,gzip,xz,bzip*,zstd,lz4,tar,gz}", use = [ "extract", "reveal" ] },
	{ mime = "application/{json,ndjson}", use = [ "edit", "reveal" ] },
	{ mime = "*/javascript", use = [ "edit", "reveal" ] },
	{ mime = "inode/empty", use = [ "edit", "reveal" ] },
	{ mime = "vfs/{absent,stale}", use = "download" },
	{ url = "*", use = [ "edit", "open", "reveal" ] },
]
