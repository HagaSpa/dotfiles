# tmux起動時のシェルをzshにする
set -g default-shell /bin/zsh

# シェルの環境変数をセッション作成時に取り込む
set -g update-environment "EDITOR VISUAL"
# yazi がターミナル種別を正しく検出するために必要
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# tmuxを256色表示できるようにする
set -g default-terminal "tmux-256color"
# Ghostty 向けに True Color をサポート
set -ga terminal-overrides ",xterm-ghostty:RGB"
# yazi の画像プレビュー等で必要なパススルーを有効化
set -g allow-passthrough on

# ステータスバーの色変更
set -g status-style 'bg=#dfffdf,fg=black'
# ステータス右側を空白
set -g status-right ''

# vimのキーバインドでペインを移動する
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# コピーモードでvimキーバインドを使う
setw -g mode-keys vi

# マウスでスクロールできるように
set -g mouse on
bind-key -T edit-mode-vi WheelUpPane send-keys -X scroll-up
bind-key -T edit-mode-vi WheelDownPane send-keys -X scroll-down

# 自動リネームを無効化（手動でウィンドウ名を設定する）
set -g automatic-rename off

# 選択されてるウィンドウを強調表示（番号のみ）
setw -g window-status-format ' #I '
setw -g window-status-current-format ' #[fg=colour255,bg=colour100,bold] λ #I #[fg=colour100,bg=colour234] '

# 直前のウィンドウに戻る
bind Space last-window

# 新しいウィンドウを作成した時に現在のパスに移動
bind c new-window -c '#{pane_current_path}'

# yazi を popup で開く (popup は passthrough 非対応のため新セッション経由)
bind y display-popup -d '#{pane_current_path}' -w 80% -h 60% -E 'tmux new-session yazi \; set status off'

# エスケープシーケンスの待機時間を0にする（キー入力の応答性向上）
set -sg escape-time 0

# フォーカスイベントをペイン内のアプリケーションに転送する
set -g focus-events on
